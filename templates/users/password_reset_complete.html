{% extends 'base.html' %}

{% block content %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 20px;
    }

    .auth-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .auth-card h2 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 16px;
        color: var(--text);
    }

    .auth-card p {
        color: var(--text2);
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 24px;
    }

    .auth-card i {
        font-size: 48px;
        color: var(--red);
        margin-bottom: 20px;
    }

    .login-link {
        display: inline-block;
        color: var(--red);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
    }

    .login-link:hover {
        color: var(--red2);
        text-decoration: underline;
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <i class="fa-solid fa-circle-check"></i>
        <h2>Password reset complete!</h2>
        <p>Your password has been successfully updated. You can now log in to your account and continue your movie journey.</p>
        
        <a href="{% url 'login' %}" class="btn-red" style="text-decoration: none; display: block;">
            Log in with new password
        </a>
    </div>
</div>
{% endblock %}
