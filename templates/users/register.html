{% extends 'base.html' %}
{% block content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
  <div style="background:#231d35; border:1px solid #3d3554; border-radius:16px; padding:36px 32px; width:100%; max-width:420px;">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:28px; margin-bottom:8px;">🎬</div>
      <h1 style="font-size:22px; font-weight:700; margin-bottom:6px;">Create your account</h1>
      <p style="font-size:14px; color:#9ca3af;">Join the community and get personalized picks</p>
    </div>
    <form method="POST">
      {% csrf_token %}
      {% for field in form %}
        <div style="margin-bottom:16px;">
          <label style="display:block; font-size:13px; font-weight:500; color:#9ca3af; margin-bottom:6px;">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <p style="color:#f87171; font-size:12px; margin-top:5px;">{{ field.errors|join:", " }}</p>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn-red">Create Account & Continue →</button>
    </form>
    <div style="text-align:center; margin-top:20px; font-size:14px; color:#9ca3af;">
      Already have an account? <a href="{% url 'login' %}" style="color:#f59e0b; font-weight:500;">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
