{% extends 'base.html' %}
{% block content %}
<style>
    .admin-add-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 100px);
        padding: 20px;
    }
    .glass-card {
        background: #1A162E; /* Ton bleu nuit CineMatch */
        border-radius: 2rem;
        padding: 2.5rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .icon-box {
        width: 50px; height: 50px;
        background: rgba(123, 87, 255, 0.2);
        color: #7B57FF;
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 1.5rem;
    }
    h2 { color: white; font-weight: 800; margin-bottom: 0.5rem; }
    .sub-title { color: rgba(255, 255, 255, 0.5); font-size: 0.85rem; margin-bottom: 2rem; }
    
    .field-group { text-align: left; margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.7rem; font-weight: 700; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; margin-bottom: 0.5rem; }
    
    /* Style pour les inputs générés par Django */
    input {
        width: 100%; padding: 1rem; border: none; border-radius: 0.8rem;
        background: rgba(255, 255, 255, 0.05); color: white; outline: none;
    }
    .btn-create {
        width: 100%; padding: 1.1rem; border: none; border-radius: 0.9rem;
        background: #7B57FF; color: white; font-weight: 800; cursor: pointer; margin-top: 1rem;
    }
</style>

<div class="admin-add-wrapper">
    <div class="glass-card">
        <div class="icon-box"><i class="fa-solid fa-user-plus"></i></div>
        <h2>Nouvel Utilisateur</h2>
        <p class="sub-title">Ajouter un membre manuellement</p>

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="field-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit"  class="btn-create">
                 Créer le compte</button>
        </form>
        
        <a href="{% url 'user-list' %}" style="display:block; margin-top:1.5rem; color:rgba(255,255,255,0.4); text-decoration:none; font-size:0.8rem;">
            ← Retour à la liste
        </a>
    </div>
</div>
{% endblock %}
